<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visma House FAQ</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  background: white;
  padding: 28px;
  border-radius: 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.07);
}

h1 {
  margin: 0 0 6px 0;
  font-size: 26px;
}

.subtitle {
  color: #666;
  margin: 0 0 20px 0;
  font-size: 15px;
}

.search-wrapper {
  position: relative;
  margin-bottom: 24px;
}

.search-wrapper svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: #999;
  pointer-events: none;
}

input {
  width: 100%;
  padding: 13px 14px 13px 42px;
  font-size: 16px;
  border: 1px solid #ddd;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.15s;
}

input:focus {
  border-color: #0057b8;
}

#categories {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.category-block {
  border: 1px solid #e0e0e0;
  border-radius: 10px;
  overflow: hidden;
}

.category-block.open {
  grid-column: 1 / -1;
}

.category-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 22px;
  background: #f7f7f7;
  cursor: pointer;
  user-select: none;
  font-weight: bold;
  font-size: 17px;
  min-height: 80px;
  transition: background 0.12s;
}

.category-header:hover {
  background: #ececec;
}

.category-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  color: #555;
}

.category-count {
  font-size: 12px;
  font-weight: normal;
  background: #e2e2e2;
  padding: 3px 10px;
  border-radius: 20px;
}

.arrow {
  font-size: 13px;
  transition: transform 0.2s;
  color: #888;
}

.category-block.open .arrow {
  transform: rotate(180deg);
}

.category-items {
  display: none;
}

.category-block.open .category-items {
  display: block;
}

.card {
  border-top: 1px solid #efefef;
  padding: 16px 22px;
}

.card b {
  font-size: 15px;
  display: block;
  margin-bottom: 4px;
}

.answer {
  color: #444;
  line-height: 1.5;
  font-size: 14px;
}

.no-results {
  color: #999;
  text-align: center;
  padding: 32px 0;
  font-size: 15px;
}
</style>
</head>

<body>
<div class="container">
  <h1>Visma House FAQ</h1>
  <p class="subtitle">Søg i praktisk information eller fold en kategori ud</p>

  <div class="search-wrapper">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" placeholder="Søg fx kantine, IT, adgang..." />
  </div>

  <div id="categories"></div>
</div>

<script>
const data = [
  {q:"Reception åbningstid",a:"07.30–16.00",c:"Kontakt"},
  {q:"Kontakt reception",a:"reception.cby@visma.com / +45 31 46 93 96",c:"Kontakt"},
  {q:"Frokost tid",a:"11.00–13.00",c:"Kantine"},
  {q:"Kantine leverandør",a:"ISS - The Food Place",c:"Kantine"},
  {q:"IT support",a:"service.visma.com",c:"IT"},
  {q:"Fitness",a:"Åben 24/7 i stueetagen",c:"Faciliteter"},
  {q:"Parkering",a:"Carlsberg Byen området",c:"Parkering"},
  {q:"Adgangskort",a:"Bruges til døre, elevatorer og kantine",c:"Adgang"}
];

const searchInput = document.getElementById("search");
const categoriesEl = document.getElementById("categories");

const openCategories = new Set();

function groupByCategory(items) {
  const groups = {};
  for (const item of items) {
    if (!groups[item.c]) groups[item.c] = [];
    groups[item.c].push(item);
  }
  return groups;
}

function render() {
  const q = searchInput.value.toLowerCase().trim();
  const isSearching = q.length > 0;

  const filtered = data.filter(i =>
    i.q.toLowerCase().includes(q) ||
    i.a.toLowerCase().includes(q) ||
    i.c.toLowerCase().includes(q)
  );

  const grouped = groupByCategory(filtered);
  const categories = Object.keys(grouped);

  if (categories.length === 0) {
    categoriesEl.innerHTML = `<div class="no-results">Ingen resultater for "${searchInput.value}".</div>`;
    return;
  }

  categoriesEl.innerHTML = categories.map(cat => {
    const isOpen = isSearching || openCategories.has(cat);
    const count = grouped[cat].length;
    return `
      <div class="category-block ${isOpen ? "open" : ""}" data-cat="${escapeAttr(cat)}">
        <div class="category-header" onclick="toggleCategory(this.closest('.category-block'))">
          <span>${escapeHtml(cat)}</span>
          <div class="category-meta">
            <span class="category-count">${count} ${count === 1 ? "spørgsmål" : "spørgsmål"}</span>
            <span class="arrow">▼</span>
          </div>
        </div>
        <div class="category-items">
          ${grouped[cat].map(item => `
            <div class="card">
              <b>${escapeHtml(item.q)}</b>
              <div class="answer">${escapeHtml(item.a)}</div>
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }).join("");
}

function toggleCategory(block) {
  const cat = block.dataset.cat;
  if (openCategories.has(cat)) {
    openCategories.delete(cat);
  } else {
    openCategories.add(cat);
  }
  block.classList.toggle("open", openCategories.has(cat));
}

function escapeHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function escapeAttr(str) {
  return str.replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

searchInput.addEventListener("input", render);

render();
</script>
</body>
</html>
