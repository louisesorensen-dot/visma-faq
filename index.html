<script>
const data = [
  {q:"Reception åbningstid",a:"07.30–16.00",c:"Kontakt"},
  {q:"Kontakt reception",a:"reception.cby@visma.com / +45 31 46 93 96",c:"Kontakt"},
  {q:"Frokost tid",a:"11.00–13.00",c:"Kantine"},
  {q:"Kantine leverandør",a:"ISS - The Food Place",c:"Kantine"},
  {q:"IT support",a:"service.visma.com",c:"IT"},
  {q:"Fitness",a:"Åben 24/7 i stueetagen",c:"Faciliteter"},
  {q:"Parkering",a:"Carlsberg Byen området",c:"Parkering"},
  {q:"Adgangskort",a:"Bruges til døre, elevatorer og kantine",c:"Adgang"}
];

const search = document.getElementById("search");
const list = document.getElementById("list");

function render() {
  const q = search.value.toLowerCase();

  const filtered = data.filter(i =>
    i.q.toLowerCase().includes(q) ||
    i.a.toLowerCase().includes(q) ||
    i.c.toLowerCase().includes(q)
  );

  list.innerHTML = filtered.map(i => `
    <div class="card">
      <b>${i.q}</b><br/>
      ${i.a}<br/>
      <span class="category">${i.c}</span>
    </div>
  `).join("");
}

search.addEventListener("input", render);

render();
</script>
