<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visma House FAQ</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --navy:      #0C3B55;
  --navy-dark: #082C40;
  --mint:      #8FD4C8;
  --mint-soft: #d6f0ec;
  --red:       #B8103A;
  --red-soft:  #fae6eb;
  --white:     #ffffff;
  --text:      #0C3B55;
  --text-soft: #4a6375;
  --bg:        #eaf4f2;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Hero header ── */
.hero {
  background: var(--navy);
  padding: 52px 24px 48px;
  text-align: center;
  color: var(--white);
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  right: -80px;
  top: -60px;
  width: 340px;
  height: 340px;
  border-radius: 50%;
  background: rgba(143,212,200,0.12);
  pointer-events: none;
}

.hero-logo {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mint);
  margin-bottom: 18px;
}

.hero h1 {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 10px;
  line-height: 1.1;
}

.hero p {
  font-size: 16px;
  opacity: 0.7;
  margin-bottom: 36px;
}

/* ── Search ── */
.search-wrap {
  max-width: 580px;
  margin: 0 auto;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: #aaa;
  pointer-events: none;
}

.search-wrap input {
  width: 100%;
  padding: 17px 18px 17px 52px;
  font-size: 16px;
  font-family: inherit;
  border: none;
  border-radius: 10px;
  outline: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22);
  color: var(--text);
  transition: box-shadow 0.2s;
}

.search-wrap input:focus {
  box-shadow: 0 8px 32px rgba(0,0,0,0.28), 0 0 0 3px var(--mint);
}

.search-wrap input::placeholder {
  color: #b0c4cc;
}

/* ── Main ── */
.main {
  max-width: 980px;
  margin: 32px auto 52px;
  padding: 0 20px;
}

/* ── Category grid ── */
#categories {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}

@media (max-width: 680px) {
  #categories { grid-template-columns: repeat(2, 1fr); }
  .hero h1 { font-size: 28px; }
}

.category-block {
  background: var(--tile-bg, var(--navy));
  border-radius: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.13);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.15s;
}

.category-block:not(.open):hover {
  box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  transform: translateY(-4px);
}

.category-block.open {
  grid-column: 1 / -1;
  box-shadow: 0 6px 24px rgba(0,0,0,0.15);
}

.category-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 26px 22px;
  cursor: pointer;
  user-select: none;
  min-height: 110px;
}

.category-block.open .category-header {
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

.cat-left {
  display: flex;
  align-items: center;
  gap: 16px;
}

.cat-icon {
  font-size: 28px;
  line-height: 1;
  width: 52px;
  height: 52px;
  background: rgba(255,255,255,0.18);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.cat-name {
  font-weight: 700;
  font-size: 16px;
  color: #fff;
}

.cat-count {
  font-size: 12px;
  color: rgba(255,255,255,0.75);
  margin-top: 4px;
  font-weight: 500;
}

.arrow {
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  transition: transform 0.25s ease;
  flex-shrink: 0;
  margin-left: 8px;
}

.category-block.open .arrow {
  transform: rotate(180deg);
}

/* ── Accordion items ── */
.category-items {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

.category-block.open .category-items {
  max-height: 3000px;
}

.category-items {
  background: #fff;
}

.card {
  border-top: 1px solid #edf4f3;
  padding: 18px 24px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 20px;
  align-items: start;
  transition: background 0.12s;
}

.card:hover {
  background: #f5faf9;
}

.card-q {
  font-weight: 700;
  font-size: 14px;
  color: var(--navy);
  line-height: 1.5;
}

.card-a {
  font-size: 14px;
  color: var(--text-soft);
  line-height: 1.6;
}

@media (max-width: 680px) {
  .card { grid-template-columns: 1fr; gap: 6px; }
}

/* ── No results ── */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 56px 24px;
  color: #aaa;
}

.no-results-icon {
  font-size: 40px;
  margin-bottom: 12px;
}

.no-results p {
  font-size: 16px;
}
</style>
</head>

const searchInput  = document.getElementById("search");
const categoriesEl = document.getElementById("categories");
const openCategories = new Set();

function groupByCategory(items) {
  const groups = {};
  for (const item of items) {
    if (!groups[item.c]) groups[item.c] = [];
    groups[item.c].push(item);
  }
  return groups;
}

function render() {
  const q          = searchInput.value.toLowerCase().trim();
  const isSearching = q.length > 0;

  const filtered = data.filter(i =>
    i.q.toLowerCase().includes(q) ||
    i.a.toLowerCase().includes(q) ||
    i.c.toLowerCase().includes(q)
  );

  const grouped    = groupByCategory(filtered);
  const categories = Object.keys(grouped);

  if (categories.length === 0) {
    categoriesEl.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🔍</div>
        <p>Ingen resultater for <strong>"${escapeHtml(searchInput.value)}"</strong></p>
      </div>`;
    return;
  }

  categoriesEl.innerHTML = categories.map(cat => {
    const isOpen = isSearching || openCategories.has(cat);
    const count  = grouped[cat].length;
    const icon   = ICONS[cat] || "📁";
    const color  = COLORS[cat] || "#0C3B55";

    return `
      <div class="category-block ${isOpen ? "open" : ""}" style="--tile-bg:${color}" data-cat="${escapeAttr(cat)}">
        <div class="category-header" onclick="toggleCategory(this.closest('.category-block'))">
          <div class="cat-left">
            <div class="cat-icon">${icon}</div>
            <div class="cat-text">
              <div class="cat-name">${escapeHtml(cat)}</div>
              <div class="cat-count">${count} ${count === 1 ? "spørgsmål" : "spørgsmål"}</div>
            </div>
          </div>
          <span class="arrow">▼</span>
        </div>
        <div class="category-items">
          ${grouped[cat].map(item => `
            <div class="card">
              <div class="card-q">${escapeHtml(item.q)}</div>
              <div class="card-a">${escapeHtml(item.a)}</div>
            </div>
          `).join("")}
        </div>
      </div>`;
  }).join("");
}

function toggleCategory(block) {
  const cat = block.dataset.cat;
  if (openCategories.has(cat)) {
    openCategories.delete(cat);
  } else {
    openCategories.add(cat);
  }
  block.classList.toggle("open", openCategories.has(cat));
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escapeAttr(s) {
  return s.replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

searchInput.addEventListener("input", render);
render();
</script>
</body>
</html>
